name: release

# Build the Windows EXE and publish it to a GitHub Release whenever a
# version tag (vX.Y.Z) is pushed. No local build or token juggling needed:
#   git tag v1.5.0 && git push origin v1.5.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: >
          pyinstaller --noconfirm --clean --onefile --windowed
          --name LeetCodeAssistant
          --icon leetcode_assistant/icon.ico
          --collect-submodules leetcode_assistant
          --collect-data leetcode_assistant
          gui_app.py

      - name: Publish release with the EXE attached
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LeetCodeAssistant.exe
          generate_release_notes: true
